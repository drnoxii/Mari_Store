<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mis Compras</title>
    <div id="head-placeholder"></div>
</head>
<body>

    <header id="header-placeholder"></header>

    <main class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-secondary">
                <i class="bi bi-bag-check me-2"></i> Mis Compras
            </h2>

            <a href="index.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-2"></i> Volver
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-header bg-info text-white">
                <h5 class="mb-0">
                    <i class="bi bi-receipt me-2"></i> Historial de compras
                </h5>
            </div>

            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-info">
                            <tr>
                                <th>ID Pedido</th>
                                <th>Fecha</th>
                                <th>Total</th>
                                <th>Método</th>
                                <th>Estado</th>
                                <th>Comprobante</th>
                                <th>Detalle</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-compras">
                            <tr>
                                <td colspan="7" class="text-center text-muted">
                                    Cargando compras...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div id="detalle-compra" class="mt-4 d-none">
                    <h5 class="fw-bold text-secondary">
                        <i class="bi bi-list-ul me-2"></i> Detalle del pedido
                    </h5>

                    <div class="table-responsive">
                        <table class="table table-bordered align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>Producto</th>
                                    <th>Talla</th>
                                    <th>Color</th>
                                    <th>Cantidad</th>
                                    <th>Precio Unitario</th>
                                    <th>Subtotal</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-detalle-compra">
                                <!-- Se llena con JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal comprobante -->
    <div class="modal fade" id="modalComprobante" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0">
                    <h5 class="modal-title text-white">
                        <i class="bi bi-receipt me-2"></i> Comprobante de pago
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center">
                    <img id="imagen-comprobante"
                         src=""
                         alt="Comprobante"
                         class="img-fluid rounded shadow"
                         style="max-height: 80vh; object-fit: contain;">
                </div>
            </div>
        </div>
    </div>
    <footer id="footer-placeholder"></footer>

    <script src="assets/js/main.js"></script>

    <script src="assets/js/cliente.js"></script>

</body>
</html>
