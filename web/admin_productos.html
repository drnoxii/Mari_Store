<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mi carrito</title>
    <div id="head-placeholder"></div>
</head>
<body>
    <header id="header-placeholder"></header>
    <main class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-secondary"><i class="bi bi-kanban me-2"></i>Panel de Productos</h2>
            <button class="btn btn-info text-white fw-bold" onclick="abrirModalNuevo()">
                <i class="bi bi-plus-circle me-2"></i> Nuevo Producto
            </button>
            <a href="pagos_pendientes.html" class="btn btn-warning fw-bold position-relative">
                <i class="bi bi-hourglass-split me-2"></i> Pagos Pendientes
                <span id="contador-pendientes"
                      class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                    0
                </span>
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-4">
                <table id="tabla-productos" class="table table-striped table-hover w-100">
                    <thead class="table-info">
                        <tr>
                            <th>#</th>
                            <th>Imagen</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Se llenará con JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>
    <!-- Modal para Crear/Editar Producto -->
    <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-info text-white">
                    <h5 class="modal-title" id="tituloModal">Nuevo Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="form-producto" enctype="multipart/form-data">
                    <div class="modal-body">
                        <input type="hidden" name="action" id="action" value="guardar">
                        <input type="hidden" name="id_producto" id="id_producto">

                        <div class="mb-3">
                            <label class="form-label">Nombre del Producto</label>
                            <input type="text" name="nombre" id="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea name="descripcion" id="descripcion" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Precio</label>
                                <input type="number" step="0.01" name="precio" id="precio" class="form-control" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Stock</label>
                                <input type="number" name="stock" id="stock" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Imagen del Producto</label>
                            <input type="file" name="imagen" id="imagen" class="form-control" accept="image/*">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-info text-white">Guardar Producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <footer id="footer-placeholder"></footer>
    <script>
document.addEventListener("DOMContentLoaded", function () {
    cargarContadorPendientes();
});

function cargarContadorPendientes() {
    fetch("/Mari_Store/AppController?action=listarPagosPendientes")
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                document.getElementById("contador-pendientes").textContent = data.cantidad;
            } else {
                document.getElementById("contador-pendientes").textContent = 0;
            }
        })
        .catch(error => {
            console.error("Error al cargar contador:", error);
            document.getElementById("contador-pendientes").textContent = 0;
        });
}
</script>
</body>
<script src="assets/js/main.js"></script>
</html>
