<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Pagos Pendientes</title>
    <div id="head-placeholder"></div>
</head>
<body>

    <header id="header-placeholder"></header>

    <main class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold text-secondary">
                <i class="bi bi-hourglass-split me-2"></i> Pagos Pendientes
            </h2>

            <a href="admin_productos.html" class="btn btn-secondary">
                <i class="bi bi-arrow-left me-2"></i> Volver
            </a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-4">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-warning">
                            <tr>
                                <th>ID Pedido</th>
                                <th>ID Pago</th>
                                <th>Método</th>
                                <th>Total Pedido</th>
                                <th>Monto Pagado</th>
                                <th>Comprobante</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-pagos-pendientes">
                            <tr>
                                <td colspan="7" class="text-center text-muted">
                                    Cargando pagos pendientes...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <!-- Modal para ver comprobante -->
    <div class="modal fade" id="modalComprobante" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark">

                <div class="modal-header border-0">
                    <h5 class="modal-title text-white">
                        <i class="bi bi-receipt me-2"></i> Comprobante de pago
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center">
                    <img id="imagen-comprobante"
                         src=""
                         alt="Comprobante de pago"
                         class="img-fluid rounded shadow"
                         style="max-height: 80vh; object-fit: contain;">
                </div>

            </div>
        </div>
    </div>
    <footer id="footer-placeholder"></footer>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/ventas.js"></script>

    
</body>
</html>
