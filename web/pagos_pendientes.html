<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pagos Pendientes</title>
    <div id="head-placeholder"></div>
</head>
<body>

<header id="header-placeholder"></header>

<main class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold text-secondary">
            <i class="bi bi-hourglass-split me-2"></i> Pagos Pendientes
        </h2>

        <a href="admin-productos.html" class="btn btn-secondary">
            <i class="bi bi-arrow-left me-2"></i> Volver
        </a>
    </div>

    <div class="card shadow border-0">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-warning">
                        <tr>
                            <th>ID Pedido</th>
                            <th>ID Pago</th>
                            <th>Método</th>
                            <th>Total Pedido</th>
                            <th>Monto Pagado</th>
                            <th>Comprobante</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-pagos-pendientes">
                        <tr>
                            <td colspan="7" class="text-center text-muted">
                                Cargando pagos pendientes...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer id="footer-placeholder"></footer>

<script src="assets/js/main.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    cargarPagosPendientes();
});

function cargarPagosPendientes() {
    fetch("/Mari_Store/AppController?action=listarPagosPendientes")
        .then(response => response.json())
        .then(data => {
            const tbody = document.getElementById("tbody-pagos-pendientes");
            tbody.innerHTML = "";

            if (!data.success || !data.data || data.data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center text-muted">
                            No hay pagos pendientes
                        </td>
                    </tr>
                `;
                return;
            }

            data.data.forEach(pago => {
                tbody.innerHTML += `
                    <tr>
                        <td>${pago.idPedido}</td>
                        <td>${pago.idPago}</td>
                        <td>${pago.metodoPago}</td>
                        <td>S/ ${Number(pago.totalPedido).toFixed(2)}</td>
                        <td>S/ ${Number(pago.monto).toFixed(2)}</td>
                        <td>${pago.comprobante}</td>
                        <td>
                            <button type="button" class="btn btn-success btn-sm"
                                    onclick="aprobarPago(${pago.idPedido})">
                                <i class="bi bi-check-circle me-1"></i> Aprobar
                            </button>
                        </td>
                    </tr>
                `;
            });
        })
        .catch(error => {
            console.error("Error al listar pagos pendientes:", error);

            const tbody = document.getElementById("tbody-pagos-pendientes");
            tbody.innerHTML = `
                <tr>
                    <td colspan="7" class="text-center text-danger">
                        Error al cargar pagos pendientes
                    </td>
                </tr>
            `;
        });
}

function aprobarPago(idPedido) {
    if (!confirm("¿Deseas aprobar este pago?")) {
        return;
    }

    fetch("/Mari_Store/AppController?action=aprobarPago&idPedido=" + idPedido, {
        method: "POST"
    })
        .then(response => response.json())
        .then(data => {
            alert(data.message);

            if (data.success) {
                cargarPagosPendientes();
            }
        })
        .catch(error => {
            console.error("Error al aprobar pago:", error);
            alert("Error al aprobar el pago");
        });
}
</script>

</body>
</html>
