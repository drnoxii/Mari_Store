<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <title>Mari_Store</title>
    <div id="head-placeholder"></div>
</head>

<body>
    <header id="header-placeholder">
    </header>
    <main>
        <section id="bienvenida">
            <h1>Promociones</h1>
        </section>
        <div id="carouselExampleIndicators" class="carousel slide">

            <div class="carousel-indicators">
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0"
                        class="active"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"></button>
            </div>

            <div class="carousel-inner">
                <div class="carousel-item active">
                    <img src="assets/img/promociones/promo_hombre.png" class="d-block w-100">
                </div>

                <div class="carousel-item">
                    <img src="assets/img/promociones/promo_mujer.png" class="d-block w-100">
                </div>

                <div class="carousel-item">
                    <img src="https://fantasyandanime.wordpress.com/wp-content/uploads/2016/11/anime-bleach-wallpaper-hd.jpg?w=900"
                         class="d-block w-100">
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
                    data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>

        </div>

        <h2 class="productos-index text-center mt-5 mb-4">Categorías</h2>

        <div class="container mt-4">
            <div class="row">

                <!-- CATEGORÍA 1 -->
                <div class="col-6 col-md-3 mb-4">
                    <div class="card producto-card h-100 shadow-sm border-0">
                        <img class="img-product"
                             src="https://yansus.com/cdn/shop/products/polonegrocorazon2.png?v=1681238171&width=1946"
                             alt="Polos">

                        <div class="card-body text-center">
                            <h5 class="card-title fw-bold">Polos</h5>
                            <p class="text-muted small">Ver todos los polos disponibles</p>

                            <a href="productos.html?categoria=1" class="btn btn-info text-white w-100">
                                Ver categoría
                            </a>
                        </div>
                    </div>
                </div>

                <!-- CATEGORÍA 2 -->
                <div class="col-6 col-md-3 mb-4">
                    <div class="card producto-card h-100 shadow-sm border-0">
                        <img class="img-product"
                             src="https://dojiw2m9tvv09.cloudfront.net/26332/product/4818746.png"
                             alt="Pantalones">

                        <div class="card-body text-center">
                            <h5 class="card-title fw-bold">Pantalones</h5>
                            <p class="text-muted small">Jeans, joggers y más</p>

                            <a href="productos.html?categoria=2" class="btn btn-info text-white w-100">
                                Ver categoría
                            </a>
                        </div>
                    </div>
                </div>

                <!-- CATEGORÍA 3 -->
                <div class="col-6 col-md-3 mb-4">
                    <div class="card producto-card h-100 shadow-sm border-0">
                        <img class="img-product"
                             src="https://www.cleanlab.pe/cdn/shop/files/pasadores-premium-accesorios-zapatillas-909528_9686399f-a19f-43d9-a9ec-67056e63d5d3.webp?v=1747945657&width=1445"
                             alt="Zapatillas">

                        <div class="card-body text-center">
                            <h5 class="card-title fw-bold">Zapatillas</h5>
                            <p class="text-muted small">Modelos urbanos y casuales</p>

                            <a href="productos.html?categoria=3" class="btn btn-info text-white w-100">
                                Ver categoría
                            </a>
                        </div>
                    </div>
                </div>

                <!-- CATEGORÍA 4 -->
                <div class="col-6 col-md-3 mb-4">
                    <div class="card producto-card h-100 shadow-sm border-0">
                        <img class="img-product"
                             src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSpk_poinqfQ3yEiCX9GX5___g68dUwKWDsoQ&s"
                             alt="Casacas">

                        <div class="card-body text-center">
                            <h5 class="card-title fw-bold">Casacas</h5>
                            <p class="text-muted small">Casacas para toda ocasión</p>

                            <a href="productos.html?categoria=4" class="btn btn-info text-white w-100">
                                Ver categoría
                            </a>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
    <footer id="footer-placeholder">

    </footer>
    <script src="assets/js/main.js"></script>
</body>


</html>
